name: Publish Gilbert Rift 0.2.0

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-v0.2.0.yml

permissions:
  contents: write

jobs:
  publish:
    name: Upload verified v0.2.0 release
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      BASE_URL: https://advisory-directors-explaining-fixed.trycloudflare.com
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: UrbanWafflezz/GilbertRift
      TAG: v0.2.0
    steps:
      - name: Download release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p assets
          download() {
            curl --fail --location --retry 8 --retry-all-errors \
              --connect-timeout 30 --output "assets/$1" "$BASE_URL/$1"
          }
          pids=()
          for asset in \
            Gilbert-Rift-0.2.0-Apple-Silicon.dmg \
            Gilbert-Rift-0.2.0-aarch64.app.tar.gz \
            Gilbert-Rift-0.2.0-aarch64.app.tar.gz.sig \
            latest.json
          do
            download "$asset" &
            pids+=("$!")
          done
          status=0
          for pid in "${pids[@]}"; do
            wait "$pid" || status=1
          done
          exit "$status"

      - name: Verify every release asset
        shell: bash
        run: |
          set -euo pipefail
          cd assets
          echo "ceff6555bf0269d952f8dc8d4d0ad5f4fa7961b9105c897a4fb4682767281db2  Gilbert-Rift-0.2.0-Apple-Silicon.dmg" | sha256sum --check -
          echo "18970daff2b229e2ff7a224bdfa1aa4dffbadf2d274fcfb62b689c9d7e433ca5  Gilbert-Rift-0.2.0-aarch64.app.tar.gz" | sha256sum --check -
          echo "400c3ab04402def9444ceaf1941d630c9feeb91b22b204461f023ce8cea015af  Gilbert-Rift-0.2.0-aarch64.app.tar.gz.sig" | sha256sum --check -
          echo "a9938a5a108bc2fe8667e46a8593d5cd70b063d00fccd64f2dee3efe97165604  latest.json" | sha256sum --check -
          jq -e '
            .version == "0.2.0" and
            (.platforms["darwin-aarch64"].signature | length > 0) and
            (.platforms["darwin-aarch64"].url | contains("/v0.2.0/"))
          ' latest.json

      - name: Publish stable GitHub release
        shell: bash
        run: |
          set -euo pipefail
          cat > release-notes.md <<'NOTES'
          ## What's new

          - Adds the new **Updates** control in the left rail.
          - Shows available version details and release notes inside Gilbert Rift.
          - Downloads signed updates, installs them, and restarts the app automatically.
          - Includes the latest frontend and trusted local backend improvements.

          ## Install

          1. Download **Gilbert-Rift-0.2.0-Apple-Silicon.dmg** below.
          2. Open the DMG and drag **Gilbert Rift** into **Applications**.
          3. Replace the previous copy if macOS asks.

          Users currently on 0.1.0 need to install this release manually once. Beginning with the next release, updates can be installed directly from the left rail.

          **Requirements:** Apple Silicon Mac, macOS 13 or newer.

          **DMG SHA-256:** `ceff6555bf0269d952f8dc8d4d0ad5f4fa7961b9105c897a4fb4682767281db2`
          NOTES

          if gh release view "$TAG" --repo "$REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" assets/* --repo "$REPOSITORY" --clobber
            gh release edit "$TAG" --repo "$REPOSITORY" \
              --title "Gilbert Rift 0.2.0" --notes-file release-notes.md \
              --draft=false --prerelease=false --latest
          else
            gh release create "$TAG" assets/* --repo "$REPOSITORY" \
              --target main --title "Gilbert Rift 0.2.0" \
              --notes-file release-notes.md --latest
          fi

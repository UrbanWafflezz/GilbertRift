name: Publish desktop update

on:
  workflow_dispatch:
    inputs:
      version:
        description: Stable app version, without the v prefix
        required: true
        type: string
      update_scope:
        description: Source area changed in this release
        options:
          - frontend
          - backend
          - both
        required: true
        type: choice
      frontend_ref:
        default: main
        description: Frontend branch, tag, or commit to package
        required: true
        type: string
      backend_ref:
        default: main
        description: Backend branch, tag, or commit to package
        required: true
        type: string
      release_notes:
        description: User-facing summary shown in the update dialog
        required: true
        type: string

concurrency:
  cancel-in-progress: false
  group: desktop-release-${{ inputs.version }}

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Apple Silicon
            node_arch: arm64
            runner: macos-14
            target: aarch64-apple-darwin
          - label: Intel
            node_arch: x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
    steps:
      - name: Check out frontend source
        uses: actions/checkout@v4
        with:
          repository: UrbanWafflezz/GilbertRift-Frontend
          path: front end
          ref: ${{ inputs.frontend_ref }}
          ssh-key: ${{ secrets.FRONTEND_DEPLOY_KEY }}
          persist-credentials: false

      - name: Check out backend source
        uses: actions/checkout@v4
        with:
          path: Backend
          ref: ${{ inputs.backend_ref }}
          repository: UrbanWafflezz/GilbertRift-Backend
          ssh-key: ${{ secrets.BACKEND_DEPLOY_KEY }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          cache-dependency-path: |
            front end/package-lock.json
            Backend/package-lock.json
          node-version: 22.13.0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install source dependencies
        run: |
          npm --prefix "front end" ci
          npm --prefix Backend ci
          npm --prefix Backend run db:generate

      - name: Validate release credentials
        env:
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          test -n "$SUPABASE_URL" || { echo "SUPABASE_URL is required."; exit 1; }
          test -n "$SUPABASE_PUBLISHABLE_KEY" || { echo "SUPABASE_PUBLISHABLE_KEY is required."; exit 1; }
          test -n "$TAURI_SIGNING_PRIVATE_KEY" || { echo "TAURI_SIGNING_PRIVATE_KEY is required."; exit 1; }

      - name: Prepare release metadata
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          umask 077
          printf 'SUPABASE_URL=%s\nSUPABASE_PUBLISHABLE_KEY=%s\n' "$SUPABASE_URL" "$SUPABASE_PUBLISHABLE_KEY" > Backend/.env
          npm --prefix "front end" run release:version -- "$RELEASE_VERSION"

      - name: Build, sign, and upload draft release
        uses: tauri-apps/tauri-action@v1
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_TOKEN: ${{ github.token }}
          GILBERT_BUILD_ARCH: ${{ matrix.node_arch }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target ${{ matrix.target }}
          owner: UrbanWafflezz
          projectPath: front end
          prerelease: false
          releaseAssetNamePattern: Gilbert-Rift-[version]-[arch][ext]
          releaseBody: |
            ${{ inputs.release_notes }}

            Update scope: ${{ inputs.update_scope }}
            Frontend source: ${{ inputs.frontend_ref }}
            Backend source: ${{ inputs.backend_ref }}
          releaseCommitish: main
          releaseDraft: true
          releaseName: Gilbert Rift __VERSION__
          repo: GilbertRift
          retryAttempts: 2
          tagName: v__VERSION__
          tauriScript: npm run app --
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true

  publish:
    name: Verify and publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Verify updater manifest and publish release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          release_id=$(gh api "repos/UrbanWafflezz/GilbertRift/releases/tags/v${VERSION}" --jq .id)
          manifest_api=$(gh api "repos/UrbanWafflezz/GilbertRift/releases/${release_id}/assets" --jq '.[] | select(.name == "latest.json") | .url')
          test -n "$manifest_api" || { echo "latest.json is missing."; exit 1; }
          gh api "$manifest_api" -H "Accept: application/octet-stream" > latest.json
          jq -e '
            .version == env.VERSION and
            (.platforms["darwin-aarch64"].url | length > 0) and
            (.platforms["darwin-aarch64"].signature | length > 0) and
            (.platforms["darwin-x86_64"].url | length > 0) and
            (.platforms["darwin-x86_64"].signature | length > 0)
          ' latest.json
          gh api --method PATCH "repos/UrbanWafflezz/GilbertRift/releases/${release_id}" -F draft=false -F prerelease=false

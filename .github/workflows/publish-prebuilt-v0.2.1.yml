name: Publish prebuilt v0.2.1

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: Verify and publish signed v0.2.1 assets
    runs-on: [self-hosted, macOS, ARM64, gilbert-rift-release-uploader]
    timeout-minutes: 45
    env:
      ASSET_DIR: /Users/kobelowery/Documents/GilbertRift/release-assets/v0.2.1
      GH_TOKEN: ${{ github.token }}
      RELEASE_NOTES: |
        ## What's fixed

        - Fixes the packaged desktop app's update check permission.
        - Correctly distinguishes an app permission or malformed release from a connection problem.
        - Keeps signed update downloads and automatic restart enabled for future releases.

        ## Install this bridge release once

        Version 0.2.0 cannot gain the missing permission by itself, so install **Gilbert-Rift-0.2.1-Apple-Silicon.dmg** once from this page. Beginning with the next release, updates can be installed directly from the **Updates** control in the left rail.

        **Requirements:** Apple Silicon Mac, macOS 13 or newer.

        **DMG SHA-256:** `60f0efa2fc60c5a76188f81c468b9db2dbb4973fec66fb62c545c691b402b57e`
    steps:
      - name: Verify signed release files
        run: |
          cd "$ASSET_DIR"
          echo "60f0efa2fc60c5a76188f81c468b9db2dbb4973fec66fb62c545c691b402b57e  Gilbert-Rift-0.2.1-Apple-Silicon.dmg" | shasum -a 256 -c -
          echo "8fe4b24b3ab21fa39b6cad0f5348f38ade222fecbd9e138bb8b3f68bcf721309  Gilbert-Rift-0.2.1-aarch64.app.tar.gz" | shasum -a 256 -c -
          echo "7d809383d6911a3be6dd2e24933b5c452676b364153cde8380570c85abd5f146  Gilbert-Rift-0.2.1-aarch64.app.tar.gz.sig" | shasum -a 256 -c -
          echo "6c8646da0f9e16b6352e12500c9d8e58e16ba3b59693740bf1a96e7837b95ed2  latest.json" | shasum -a 256 -c -
          jq -e '.version == "0.2.1" and (.platforms["darwin-aarch64"].signature | length > 0)' latest.json

      - name: Publish GitHub release
        run: |
          gh release create v0.2.1 \
            "$ASSET_DIR/Gilbert-Rift-0.2.1-Apple-Silicon.dmg" \
            "$ASSET_DIR/Gilbert-Rift-0.2.1-aarch64.app.tar.gz" \
            "$ASSET_DIR/Gilbert-Rift-0.2.1-aarch64.app.tar.gz.sig" \
            "$ASSET_DIR/latest.json" \
            --repo UrbanWafflezz/GilbertRift \
            --target main \
            --title "Gilbert Rift 0.2.1" \
            --notes "$RELEASE_NOTES" \
            --latest
